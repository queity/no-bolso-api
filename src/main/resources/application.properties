spring.application.name=no-bolso-api
server.port=8080
spring.mvc.servlet.path=/api

# H2 (mock/dev) — substituir por PostgreSQL quando migrar
spring.datasource.url=jdbc:h2:mem:nobolso
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# CORS — sobrescrever em produção com a URL real do frontend
cors.allowed-origins=*
